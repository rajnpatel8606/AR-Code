<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Food Viewer</title>

<!-- Google Fonts: Playfair Display (elegant serif for restaurant branding) + Inter (clean UI) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- model-viewer WebXR component -->
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>

<!-- App styles (CSS variables + all layout/UI rules) -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<div class="title">
  <img id="brand-logo" alt="Brand Logo">
  <span id="brand-name">AR Food Viewer</span>
  <p class="brand-tagline">Explore our dishes in AR</p>
</div>

<!-- ── 3-D / AR Viewer ────────────────────────────────────────────────── -->
<model-viewer
  id="model"
  ar
  ar-modes="scene-viewer webxr  quick-look"
  ar-scale="fixed"
  ar-placement="floor"
  camera-controls
  interaction-prompt="auto"
  touch-action="pan-y"
  camera-target="0m 0m 0m"
  auto-rotate
  rotation-per-second="30deg"
  shadow-intensity="2"
  shadow-softness="0.8"
  exposure="1.9"
  environment-image="neutral"
  xr-environment
  alt="3D Food Model"
>

  <div id="loading">Loading model...</div>

  <!-- Custom AR button — only shown on AR-capable devices -->
  <button slot="ar-button" id="ar-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- AR scan-frame corner brackets -->
      <path d="M3 8V4h4M17 4h4v4M21 16v4h-4M7 20H3v-4"
            stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- 3-D cube -->
      <path d="M12 9l3.5 2v4L12 17l-3.5-2v-4L12 9z"
            stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
      <line x1="12" y1="9"  x2="12" y2="17" stroke="white" stroke-width="1.5"/>
      <line x1="8.5" y1="11" x2="15.5" y2="11" stroke="white" stroke-width="1.5"/>
    </svg>
    View in Your Space
  </button>

  <!-- AR placement prompt -->
  <div slot="ar-prompt" style="
    position:absolute;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7);
    color:white;
    padding:10px 18px;
    border-radius:8px;
    font-size:14px;
  ">
    👆 Tap to place • Use two fingers to rotate
  </div>

</model-viewer>

<!-- ── Progress bar ───────────────────────────────────────────────────── -->
<div id="progress-bar-container">
  <div id="progress-bar"></div>
</div>

<!-- ── Error banner ───────────────────────────────────────────────────── -->
<div id="error-banner">
  ⚠️ Could not load this model. Showing a default instead.
</div>

<!-- ── Model carousel ─────────────────────────────────────────────────── -->
<div class="slider">
  <div class="slides" id="carousel"></div>
</div>

<!-- ── Instructions ───────────────────────────────────────────────────── -->
<div class="instructions">
  Tap "View in AR" → Point at table → Tap to place → Drag to move
</div>

<!-- ── Application logic ──────────────────────────────────────────────── -->
<script src="app.js"></script>

</body>
</html>
